<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segoy Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div id="app" class="max-w-sm mx-auto">
        <h1 class="text-xl font-bold mb-4">Kasir Segoy Mart</h1>
        
        <!-- Input Barang Baru -->
        <div class="bg-white p-4 rounded-xl shadow mb-4">
            <input type="text" id="nama" placeholder="Nama Produk" class="w-full border p-2 mb-2 rounded">
            <input type="number" id="harga" placeholder="Harga" class="w-full border p-2 mb-2 rounded">
            <button onclick="tambahBarang()" class="w-full bg-green-600 text-white py-2 rounded">Tambah ke Menu</button>
        </div>

        <!-- Daftar Menu (Yang diklik) -->
        <div id="menuBarang" class="grid grid-cols-2 gap-2 mb-4"></div>

        <!-- Keranjang Transaksi -->
        <div class="bg-white p-4 rounded-xl shadow">
            <h2 class="font-bold mb-2">Keranjang</h2>
            <div id="keranjang"></div>
            <hr class="my-2">
            <p id="totalHarga" class="font-bold text-lg">Total: Rp0</p>
            <button onclick="resetKeranjang()" class="mt-2 w-full bg-red-500 text-white py-1 rounded text-sm">Reset Keranjang</button>
        </div>
    </div>

    <script>
        let menu = JSON.parse(localStorage.getItem('menu')) || [];
        let keranjang = [];

        function tambahBarang() {
            let nama = document.getElementById('nama').value;
            let harga = parseInt(document.getElementById('harga').value);
            if(nama && harga) {
                menu.push({nama, harga});
                localStorage.setItem('menu', JSON.stringify(menu));
                renderMenu();
            }
        }

        function klikProduk(index) {
            keranjang.push(menu[index]);
            renderKeranjang();
        }

        function resetKeranjang() {
            keranjang = [];
            renderKeranjang();
        }

        function renderMenu() {
            document.getElementById('menuBarang').innerHTML = menu.map((p, i) => 
                `<button onclick="klikProduk(${i})" class="bg-white p-4 rounded shadow text-center border hover:bg-gray-50">
                    <p class="font-bold">${p.nama}</p>
                    <p class="text-sm text-gray-600">Rp${p.harga}</p>
                </button>`).join('');
        }

        function renderKeranjang() {
            let total = 0;
            document.getElementById('keranjang').innerHTML = keranjang.map(p => {
                total += p.harga;
                return `<p class="text-sm">${p.nama} - Rp${p.harga}</p>`;
            }).join('');
            document.getElementById('totalHarga').innerText = "Total: Rp" + total;
        }

        renderMenu();
    </script>
</body>
</html>
