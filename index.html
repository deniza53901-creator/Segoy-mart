<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segoy Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div id="app" class="max-w-sm mx-auto">
        <!-- Login -->
        <div id="login-screen" class="bg-white p-6 rounded-2xl shadow-xl mt-20">
            <h2 class="text-xl font-bold mb-4 text-center">Login Segoy Mart</h2>
            <input type="password" id="pass" class="w-full border p-2 rounded-lg mb-4" placeholder="Password">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">Masuk</button>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <h1 class="text-xl font-bold mb-4">Segoy Mart</h1>
            
            <div class="bg-white p-4 rounded-xl shadow mb-4">
                <input type="text" id="namaProduk" placeholder="Nama Barang" class="w-full border p-2 mb-2 rounded">
                <input type="number" id="hargaProduk" placeholder="Harga" class="w-full border p-2 mb-2 rounded">
                <!-- Dropdown Kategori -->
                <select id="kategoriProduk" class="w-full border p-2 mb-2 rounded">
                    <option value="Makanan">Makanan</option>
                    <option value="Minuman">Minuman</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
                <button onclick="simpanProduk()" class="w-full bg-green-600 text-white py-2 rounded">Simpan Produk</button>
            </div>

            <div id="daftarProduk" class="bg-white p-4 rounded-xl shadow"></div>
        </div>
    </div>

    <script>
        let produkList = JSON.parse(localStorage.getItem('produk')) || [];

        function login() {
            if(document.getElementById('pass').value === "123") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                render();
            } else { alert("Password salah!"); }
        }

        function simpanProduk() {
            let nama = document.getElementById('namaProduk').value;
            let harga = document.getElementById('hargaProduk').value;
            let kategori = document.getElementById('kategoriProduk').value;
            if(nama && harga) {
                produkList.push({nama, harga, kategori});
                localStorage.setItem('produk', JSON.stringify(produkList));
                render();
            }
        }

        function render() {
            document.getElementById('daftarProduk').innerHTML = produkList.map(p => 
                `<p class="border-b py-2"><strong>[${p.kategori}]</strong> ${p.nama} - Rp${p.harga}</p>`).join('');
        }
    </script>
</body>
</html>
