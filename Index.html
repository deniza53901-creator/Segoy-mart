<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segoy Mart - Aplikasi Kasir Lengkap</title>
    <!-- Tailwind CSS untuk tampilan modern -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome untuk ikon-ikon kasir -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans min-h-screen">

    <!-- ========================================== -->
    <!-- 1. HALAMAN LOGIN LENGKAP -->
    <!-- ========================================== -->
    <div id="login-page" class="flex min-h-screen items-center justify-center bg-gradient-to-br from-indigo-900 to-purple-700 p-4">
        <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-2xl text-center">
            <div class="inline-flex h-16 w-16 items-center justify-center rounded-2xl bg-indigo-600 text-white text-3xl shadow-lg mb-4">
                <i class="fa-solid fa-shop"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tight text-slate-800 uppercase">Segoy Mart</h1>
            <p class="text-sm text-slate-500 mt-1 mb-8">Silakan masuk ke sistem kasir</p>

            <!-- Login Owner -->
            <button onclick="loginOwner()" class="flex w-full items-center justify-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-700 shadow-sm transition hover:bg-slate-50 active:scale-[0.98]">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-5 w-5" alt="Google">
                Masuk sebagai Pemilik (Google)
            </button>

            <div class="relative my-6 flex items-center justify-center">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
                <span class="relative bg-white px-3 text-xs font-bold uppercase tracking-wider text-slate-400">Atau Staf Kasir</span>
            </div>

            <!-- Login Staff -->
            <div class="text-left mb-4">
                <label class="text-xs font-bold uppercase tracking-wide text-slate-600 block mb-2">Password Staf:</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="staff-password" placeholder="Masukkan password staf..." class="w-full rounded-xl border border-slate-200 bg-slate-50 py-3 pl-10 pr-4 text-sm focus:border-indigo-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-100 transition">
                </div>
            </div>

            <button onclick="loginStaff()" class="w-full rounded-xl bg-indigo-600 py-3 text-sm font-bold text-white shadow-md shadow-indigo-200 transition hover:bg-indigo-700 active:scale-[0.98]">
                Masuk Sebagai Kasir
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- 2. DASHBOARD UTAMA (KASIR & OWNER) -->
    <!-- ========================================== -->
    <div id="main-dashboard" class="hidden flex flex-col min-h-screen">
        <!-- Navbar -->
        <header class="bg-white border-b border-slate-200 sticky top-0 z-10 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-xl shadow-md">
                    <i class="fa-solid fa-store"></i>
                </div>
                <div>
                    <h2 class="font-black text-slate-800 tracking-tight text-lg">SEGOY MART</h2>
                    <p id="user-role-badge" class="text-xs font-bold text-indigo-600 uppercase tracking-widest"></p>
                </div>
            </div>
            <button onclick="logout()" class="flex h-10 w-10 items-center justify-center rounded-xl bg-red-50 text-red-600 hover:bg-red-100 transition shadow-sm" title="Keluar">
                <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </button>
        </header>

        <!-- Konten Utama -->
        <main class="flex-1 p-6 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Kolom Kiri: Statistik Owner & Katalog Produk -->
            <div class="lg:col-span-2 flex flex-col gap-6">
                
                <!-- Laporan Keuangan Keuntungan (Hanya muncul jika login Owner) -->
                <div id="owner-stats" class="grid grid-cols-1 sm:grid-cols-3 gap-4 hidden">
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                        <div class="h-12 w-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center text-xl"><i class="fa-solid fa-wallet"></i></div>
                        <div>
                            <p class="text-xs font-semibold text-slate-400 uppercase">Omzet</p>
                            <h3 id="stat-omzet" class="text-lg font-black text-slate-800">Rp 0</h3>
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                        <div class="h-12 w-12 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center text-xl"><i class="fa-solid fa-chart-line"></i></div>
                        <div>
                            <p class="text-xs font-semibold text-slate-400 uppercase">Laba Bersih</p>
                            <h3 id="stat-laba" class="text-lg font-black text-slate-800">Rp 0</h3>
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                        <div class="h-12 w-12 rounded-xl bg-rose-50 text-rose-600 flex items-center justify-center text-xl"><i class="fa-solid fa-arrow-trend-down"></i></div>
                        <div>
                            <p class="text-xs font-semibold text-slate-400 uppercase">Pengeluaran Toko</p>
                            <h3 id="stat-pengeluaran" class="text-lg font-black text-slate-800">Rp 150.000</h3>
                        </div>
                    </div>
                </div>

                <!-- Katalog Produk Makanan -->
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex-1">
                    <h3 class="font-bold text-slate-800 text-base mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-boxes-stacked text-indigo-600"></i> Katalog Produk Segoy Mart
                    </h3>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-4" id="product-grid">
                        <!-- Produk di-render otomatis melalui Javascript di bawah -->
                    </div>
                </div>
            </div>

            <!-- Kolom Kanan: Struk & Sistem Pembayaran Kasir -->
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 flex flex-col max-h-[calc(100vh-120px)] sticky top-24">
                <h3 class="font-bold text-slate-800 text-base mb-4 flex items-center gap-2 border-b border-slate-100 pb-3">
                    <i class="fa-solid fa-cart-shopping text-indigo-600"></i> Struk Keranjang Belanja
                </h3>
                
                <!-- Daftar Item yang dibeli -->
                <div class="flex-1 overflow-y-auto space-y-3 pr-1" id="cart-items">
                    <p class="text-center text-sm text-slate-400 my-8">Keranjang masih kosong</p>
                </div>
                
                <!-- Hitungan Total & Kalkulator Kembalian Uang -->
                <div class="border-t border-slate-100 pt-4 mt-4 space-y-4">
                    <div class="flex items-center justify-between font-black text-slate-800 text-lg">
                        <span>TOTAL AKHIR :</span>
                        <span id="cart-total">Rp 0</span>
                    </div>
                    <div>
                        <label class="text-xs font-bold uppercase tracking-wider text-slate-500 block mb-1">Uang Tunai Pembeli (Rp):</label>
                        <input type="number" id="cash-input" oninput="calculateChange()" placeholder="Masukkan uang tunai..." class="w-full rounded-xl border border-slate-200 bg-slate-50 py-3 px-4 text-base font-bold text-slate-800 focus:border-indigo-500 focus:bg-white focus:outline-none transition">
                    </div>
                    <div class="flex items-center justify-between font-bold text-slate-600 bg-slate-50 p-3 rounded-xl">
                        <span class="text-sm">Kembalian:</span>
                        <span id="cash-change" class="text-base text-indigo-600 font-extrabold">Rp 0</span>
                    </div>
                    <button onclick="checkout()" class="w-full rounded-xl bg-emerald-600 py-3.5 text-center text-sm font-bold text-white shadow-md shadow-emerald-100 hover:bg-emerald-700 transition active:scale-[0.98]">
                        <i class="fa-solid fa-print mr-2"></i> Bayar & Cetak Struk Belanja
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- ========================================== -->
    <!-- 3. LOGIKA SISTEM JAVASCRIPT (TERINTEGRASI) -->
    <!-- ========================================== -->
    <script>
        // Data Produk Toko Segoy Mart
        const products = [
            { id: 1, name: "Nasi Goreng Segoy", price: 15000, cost: 9000, icon: "fa-plate-wheat", color: "text-amber-600 bg-amber-50" },
            { id: 2, name: "Mie Goreng Spesial", price: 13000, cost: 8000, icon: "fa-bowl-food", color: "text-yellow-600 bg-yellow-50" },
            { id: 3, name: "Es Teh Manis Jumbo", price: 5000, cost: 2000, icon: "fa-glass-water", color: "text-blue-600 bg-blue-50" },
            { id: 4, name: "Ayam Goreng Krispi", price: 12000, cost: 7500, icon: "fa-drumstick-bite", color: "text-orange-600 bg-orange-50" },
            { id: 5, name: "Camilan Kentang", price: 8000, cost: 4500, icon: "fa-cookie", color: "text-red-600 bg-red-50" }
        ];

        let cart = [];
        let totalOmzet = 0;
        let totalLaba = 0;
        let fixedPengeluaran = 150000;
        let currentRole = "";

        // Fungsi Render Katalog ke Layar
        function displayProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div onclick="addToCart(${p.id})" class="bg-white border border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-center text-center cursor-pointer transition hover:shadow-md hover:border-indigo-300 active:scale-95">
                    <div class="h-14 w-14 rounded-2xl ${p.color} flex items-center justify-center text-2xl mb-3">
                        <i class="fa-solid ${p.icon}"></i>
                    </div>
                    <h4 class="font-bold text-sm text-slate-800 line-clamp-1">${p.name}</h4>
                    <p class="text-xs text-slate-500 font-extrabold mt-1">Rp ${p.price.toLocaleString('id-ID')}</p>
                </div>
            `).join('');
        }

        // Sistem Login Kasir & Owner
        function loginStaff() {
            const pass = document.getElementById('staff-password').value;
            if(pass === "Segoy mart 2026") {
                enterDashboard("Kasir / Staf");
            } else {
                alert("Password Salah! Gunakan: Segoy mart 2026");
            }
        }

        function loginOwner() {
            enterDashboard("Owner / Pemilik");
            document.getElementById('owner-stats').classList.remove('hidden');
        }

        function enterDashboard(role) {
            currentRole = role;
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('user-role-badge').innerText = role;
            displayProducts();
            updateCartUI();
        }

        function logout() {
            document.getElementById('login-page').classList.remove('hidden');
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById('owner-stats').classList.add('hidden');
            document.getElementById('staff-password').value = "";
            cart = [];
        }

        // Manajemen Keranjang Kasir
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const exists = cart.find(item => item.id === productId);
            if(exists) {
                exists.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCartUI();
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if(item) {
                item.qty += delta;
                if(item.qty <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            if(cart.length === 0) {
                container.innerHTML = `<p class="text-center text-sm text-slate-400 my-8">Keranjang masih kosong</p>`;
                document.getElementById('cart-total').innerText = "Rp 0";
                calculateChange();
                return;
            }

            let total = 0;
            container.innerHTML = cart.map(item => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                return `
                    <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <div>
                            <h5 class="font-bold text-sm text-slate-800">${item.name}</h5>
                            <p class="text-xs text-slate-400">Rp ${item.price.toLocaleString('id-ID')} x ${item.qty}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-extrabold text-sm text-slate-800">Rp ${subtotal.toLocaleString('id-ID')}</span>
                            <div class="flex items-center border border-slate-200 bg-white rounded-lg overflow-hidden">
                                <button onclick="changeQty(${item.id}, -1)" class="px-2 py-0.5 bg-slate-50 hover:bg-slate-100 font-bold text-xs">-</button>
                                <span class="px-2 text-xs font-bold text-slate-700">${item.qty}</span>
                                <button onclick="changeQty(${item.id}, 1)" class="px-2 py-0.5 bg-slate-50 hover:bg-slate-100 font-bold text-xs">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('cart-total').innerText = "Rp " + total.toLocaleString('id-ID');
            calculateChange();
        }

        // Hitung Kembalian Otomatis
        function calculateChange() {
            let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let cash = parseFloat(document.getElementById('cash-input').value) || 0;
            let change = cash - total;
            
            if(change < 0 || total === 0) {
                document.getElementById('cash-change').innerText = "Rp 0";
            } else {
                document.getElementById('cash-change').innerText = "Rp " + change.toLocaleString('id-ID');
            }
        }

        // Proses Checkout Transaksi & Update Keuntungan Finansial
        function checkout() {
            if(cart.length === 0) return alert("Keranjang kosong!");
            let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let cash = parseFloat(document.getElementById('cash-input').value) || 0;
            
            if(cash < total) return alert("Uang tunai pembayaran kurang!");

            // Hitung Omzet & Laba Bersih internal
            cart.forEach(item => {
                totalOmzet += (item.price * item.qty);
                totalLaba += ((item.price - item.cost) * item.qty);
            });

            // Update Panel Keuangan Owner secara Realtime
            document.getElementById('stat-omzet').innerText = "Rp " + totalOmzet.toLocaleString('id-ID');
            let labaBersihReal = totalLaba - fixedPengeluaran;
            document.getElementById('stat-laba').innerText = (labaBersihReal < 0 ? "-" : "") + "Rp " + Math.abs(labaBersihReal).toLocaleString('id-ID');

            alert("Transaksi Sukses!\nStruk berhasil dicetak ke sistem kasir Segoy Mart.");
            
            // Reset Kasir kembali kosong
            cart = [];
            document.getElementById('cash-input').value = "";
            updateCartUI();
        }
    </script>
</body>
</html>
